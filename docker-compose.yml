services:
  # ──────────────────────────────────────────────
  # Ollama
  # ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    environment:
      OLLAMA_NUM_CTX: 2048

    ports:
      - "11434:11434"

    volumes:
      - ollama-data:/root/.ollama

    networks:
      - rag-audio

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

    # Uncomment for NVIDIA GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ──────────────────────────────────────────────
  # Pull models once
  # ──────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    restart: "no"

    environment:
      OLLAMA_HOST: http://ollama:11434

    depends_on:
      ollama:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "⏳ Waiting for Ollama..."
        until ollama list >/dev/null 2>&1; do
          sleep 3
        done

        echo "📥 Pulling llama3.2:1b..."
        ollama pull llama3.2:1b

        echo "📥 Pulling nomic-embed-text..."
        ollama pull nomic-embed-text

        cat >/tmp/Modelfile <<EOF
        FROM llama3.2:1b
        PARAMETER num_ctx 2048
        EOF

        echo "🔧 Creating custom model..."
        ollama create llama3.2:1b-ctx2k -f /tmp/Modelfile

        echo "✅ Models ready."

    networks:
      - rag-audio

  # ──────────────────────────────────────────────
  # API
  # ──────────────────────────────────────────────
  rag-api:
    build: .
    container_name: audio-rag-api

    ports:
      - "${PORT:-8000}:8000"

    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: llama3.2:1b-ctx2k
      OLLAMA_EMBED_MODEL: nomic-embed-text

    volumes:
      - ./data:/app/data
      - whisper-cache:/root/.cache/whisper

    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 300s

    networks:
      - rag-audio

volumes:
  whisper-cache:
  ollama-data:

networks:
  rag-audio:
    driver: bridge