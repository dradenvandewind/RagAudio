services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

    # --- Pour activer le GPU (nécessite nvidia-container-toolkit) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build: .
    container_name: audio-rag-api
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_LLM_MODEL=llama3.1
      - OLLAMA_EMBED_MODEL=nomic-embed-text
    volumes:
      # Persistance des audios, srt et de l'index vectoriel hors du conteneur
      - ./data:/app/data
      # Cache des modèles Whisper (~1-3 Go selon le modèle) pour éviter
      # de les re-télécharger à chaque rebuild/redémarrage
      - whisper-cache:/root/.cache/whisper
    restart: unless-stopped

volumes:
  whisper-cache:
  ollama-data:
