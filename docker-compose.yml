services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - rag-audio
    volumes:
      - redis-data:/data

  # ──────────────────────────────────────────────
  # Ollama
  # ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    environment:
      OLLAMA_NUM_CTX: 
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_KEEP_ALIVE: "5m"

    ports:
      - "11434:11434"

    volumes:
      - ollama-data:/root/.ollama

    networks:
      - rag-audio

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

    # Uncomment for NVIDIA GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ──────────────────────────────────────────────
  # Pull models once
  # ──────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    restart: "no"

    environment:
      OLLAMA_HOST: http://ollama:11434

    depends_on:
      ollama:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "⏳ Waiting for Ollama..."
        until ollama list >/dev/null 2>&1; do
          sleep 3
        done

        echo "📥 Pulling llama3.2:1b..."
        ollama pull llama3.2:1b

        echo "📥 Pulling nomic-embed-text..."
        ollama pull nomic-embed-text

        echo "📥 Pulling qwen2.5:7b (traduction)..."
        ollama pull qwen2.5:7b

        cat >/tmp/Modelfile <<EOF
        FROM llama3.2:1b
        PARAMETER num_ctx 2048
        EOF

        echo "🔧 Creating custom model..."
        ollama create llama3.2:1b-ctx2k -f /tmp/Modelfile

        echo "✅ Models ready."

    networks:
      - rag-audio

  # ──────────────────────────────────────────────
  # API
  # ──────────────────────────────────────────────
  rag-api:
    build: .
    container_name: rag-llamaindex

    ports:
      - "${PORT:-8000}:8000"

    environment:
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: llama3.2:1b-ctx2k
      OLLAMA_EMBED_MODEL: nomic-embed-text
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_TRANSLATE_MODEL: qwen2.5:7b
   
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    volumes:
      - ./data:/app/data
      - whisper-cache:/root/.cache/whisper

    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      redis:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 300s

    networks:
      - rag-audio
 # =========================
  # 📊 PROMETHEUS
  # =========================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - rag-api

  # =========================
  # 📈 GRAFANA
  # =========================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # =========================
  # 📈 Monitoring Host
  # =========================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    ports:
      - "9100:9100"

  # =========================
  # 📈 Monitoring Container on host
  # =========================

  cadvisor:
      image: gcr.io/cadvisor/cadvisor:latest
      container_name: cadvisor
      ports:
        - "8081:8080"
      volumes:
        - /:/rootfs:ro
        - /var/run:/var/run:ro
        - /sys:/sys:ro
        - /var/lib/docker/:/var/lib/docker:ro
      restart: unless-stopped

  dcgm-exporter:
      image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.1-ubuntu22.04
      container_name: dcgm-exporter
      restart: unless-stopped
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      cap_add:
        - SYS_ADMIN
      ports:
        - "9400:9400"

volumes:
  whisper-cache:
  ollama-data:
  redis-data:
  grafana-data:

networks:
  rag-audio:
    driver: bridge